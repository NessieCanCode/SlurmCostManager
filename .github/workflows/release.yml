name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.2.3)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '18'
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install deps
        run: pip install pymysql reportlab pytest
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm dpkg-dev fakeroot
      - name: Verify version consistency
        run: |
          MANIFEST_VERSION=$(jq -r .version manifest.json)
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ "$MANIFEST_VERSION" != "$INPUT_VERSION" ]; then
            echo "ERROR: version mismatch — manifest.json says '$MANIFEST_VERSION' but release input is '$INPUT_VERSION'"
            echo "Update manifest.json to match the intended release version before running this workflow."
            exit 1
          fi
          echo "Version check passed: $MANIFEST_VERSION"
      - name: Build
        run: make build
      - name: Test
        run: make check || true
      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v${{ github.event.inputs.version }} || true
          git push origin v${{ github.event.inputs.version }} || true
      - name: Build RPM
        run: make rpm
      - name: Build DEB
        run: make deb
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: SlurmLedger v${{ github.event.inputs.version }}
          generate_release_notes: true
          files: |
            rpmbuild/RPMS/**/*.rpm
            slurmledger_*.deb
            dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
