name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Python lint deps
        run: pip install flake8==7.1.1
      - name: Python lint
        run: flake8 src test
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install ESLint
        run: |
          npm init -y >/dev/null 2>&1
          npm install eslint@9.0.0 >/dev/null 2>&1
      - name: JavaScript lint
        run: npx eslint src test --ext .js

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Python unit tests
        run: |
          pip install pytest==8.3.3 >/dev/null 2>&1
          PYTHONPATH=src python -m pytest test/unit/ -v
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: JS tests
        run: |
          for f in test/unit/*.test.js; do node "$f"; done

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run integration tests
        run: make check

  db-integration:
    name: Database Integration Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: slurm_acct_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pymysql reportlab
      - name: Load test schema
        run: mysql -h 127.0.0.1 -u root -ptestpass slurm_acct_db < test/example_slurmdb_for_testing.sql
      - name: Run integration test
        run: |
          python3 src/slurmdb.py --host 127.0.0.1 --user root --password testpass \
            --database slurm_acct_db --cluster test_cluster \
            --start 2024-01-01 --end 2024-12-31 --output - > /dev/null
          echo "Integration test passed"

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Bandit
        run: pip install bandit==1.8.0
      - name: Run Bandit
        run: bandit -r src
